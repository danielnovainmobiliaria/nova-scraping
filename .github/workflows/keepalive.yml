name: Mantener la app despierta

# Visita la app cada 6 horas para que el servidor gratis no la duerma.
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Visitar la app
        run: |
          URL="https://nova-scraping-yxhsgk9bbe5ibjrbakr4bh.streamlit.app/"
          for i in 1 2 3; do
            code=$(curl -sS -L --max-time 90 -A "nova-keepalive" -o /dev/null -w "%{http_code}" "$URL") || code=000
            echo "Intento $i -> HTTP $code"
            [ "$code" = "200" ] && break
            sleep 30
          done
