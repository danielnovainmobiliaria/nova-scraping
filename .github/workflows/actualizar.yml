name: Actualizar inmuebles (automático)

# Corre solo todos los días, y también se puede correr a mano con un botón.
on:
  schedule:
    - cron: "0 13 * * *"   # 8:00 a.m. hora Colombia (UTC-5)
  workflow_dispatch: {}

permissions:
  contents: write   # keepalive: evita que GitHub apague el cron a los 60 días sin commits
  issues: write     # aviso automático si el robot falla

jobs:
  actualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Instalar dependencias
        run: pip install -r requirements.txt
      - name: Traer y leer publicaciones
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-haiku-4-5-20251001
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python job_actualizar.py
      # GitHub desactiva los crons tras 60 días sin actividad en el repo; este paso
      # hace un mini-commit de mantenimiento cuando hace falta para que NUNCA se apague.
      # (Sin acciones de terceros: GitHub las bloqueó y tumbaba TODO el robot.)
      - name: Mantener vivo el robot (keepalive)
        if: success()
        run: |
          DIAS=$(( ( $(date +%s) - $(git log -1 --format=%ct) ) / 86400 ))
          if [ "$DIAS" -ge 40 ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit --allow-empty -m "🤖 keepalive: mantener activo el robot diario"
            git push
          else
            echo "Último commit hace $DIAS día(s): no hace falta keepalive."
          fi
      # Si el día falló por completo, abre un Issue para que quede una alerta visible.
      - name: Avisar si falló
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue list --repo "$GITHUB_REPOSITORY" --state open --search "Robot diario falló" --json number --jq 'length' | grep -q '^0$' && \
          gh issue create --repo "$GITHUB_REPOSITORY" \
            --title "⚠️ Robot diario falló ($(date -u +%Y-%m-%d))" \
            --body "La actualización automática de hoy falló por completo. Revisa los logs en la pestaña Actions. Causas típicas: llave de Apify/Claude vencida, plan agotado, o Neon inaccesible." \
            || true
